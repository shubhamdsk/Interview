<div class="table-wrapper">
  <h1>User Information</h1>

  <div *ngIf="isLoading()">
    <p>Loading users...</p>
  </div>

  <div *ngIf="errorMessage()">
    <p class="error">{{ errorMessage() }}</p>
  </div>

  <div *ngIf="!isLoading() && user().length > 0">
    <table>
      <thead>
        <tr>
          <th>Id</th>
          <th>Name</th>
          <th>Username</th>
          <th>Website</th>
          <th>Phone</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of user()">
          <td>{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.username }}</td>
          <td>{{ item.website }}</td>
          <td>{{ item.phone }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!isLoading() && user().length === 0 && !errorMessage()">
    <p>No users found.</p>
  </div>
</div>
